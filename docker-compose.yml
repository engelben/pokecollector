services:
  postgres:
    image: postgres:18-alpine
    container_name: pokemon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: pokemon_tcg
    volumes:
      - postgres_data:/var/lib/postgresql
    command:
      - sh
      - -c
      - |
        for legacy_pg_version_file in /var/lib/postgresql/PG_VERSION /var/lib/postgresql/data/PG_VERSION; do
          if [ -s "$${legacy_pg_version_file}" ]; then
            legacy_pg_version="$$(cat "$${legacy_pg_version_file}")"
            if [ "$${legacy_pg_version}" != "18" ]; then
              echo >&2 "ERROR: Found PostgreSQL $${legacy_pg_version} data in the postgres_data volume."
              echo >&2 "Run ./scripts/upgrade-postgres-15-to-18.sh before starting PostgreSQL 18."
              echo >&2 "Do not delete the volume; it is needed for the upgrade/rollback path."
              exit 1
            fi
          fi
        done
        exec docker-entrypoint.sh postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon -d pokemon_tcg"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pokemon-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pokemon:${POSTGRES_PASSWORD:-changeme}@postgres:5432/pokemon_tcg
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TCGDEX_SYNC_LANGUAGES: ${TCGDEX_SYNC_LANGUAGES:-en,de}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      PRE_UPGRADE_BACKUP_ENABLED: ${PRE_UPGRADE_BACKUP_ENABLED:-true}
      PRE_UPGRADE_BACKUP_REQUIRED: ${PRE_UPGRADE_BACKUP_REQUIRED:-true}
      PRE_UPGRADE_BACKUP_KEEP: ${PRE_UPGRADE_BACKUP_KEEP:-10}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_MODE: ${PUBLIC_MODE:-false}
    container_name: pokemon-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
